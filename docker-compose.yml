version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: abc_lms_db
    environment:
      POSTGRES_USER: abc_user
      POSTGRES_PASSWORD: abc_password
      POSTGRES_DB: abc_lms
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - abc_network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: abc_lms_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@abc.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    networks:
      - abc_network

volumes:
  postgres_data:

networks:
  abc_network:
    driver: bridge
